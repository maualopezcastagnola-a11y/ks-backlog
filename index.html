<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ks·backlog</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F8F7;color:#1a1a1a;min-height:100vh;font-size:14px}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:215px;background:#fff;border-right:1px solid #EBEBEA;display:flex;flex-direction:column;z-index:50;overflow-y:auto}
.main{margin-left:215px;min-height:100vh}
.topbar{height:50px;background:#fff;border-bottom:1px solid #EBEBEA;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:40}
.content{padding:1.25rem}
/* SIDEBAR */
.sb-logo{padding:1rem 1rem .75rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid #EBEBEA;flex-shrink:0}
.sb-mark{width:26px;height:26px;background:#1a1a1a;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.sb-text{font-size:13px;font-weight:600}.sb-text span{color:#7F77DD}
.sb-section{padding:.6rem .75rem .15rem;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#9a9a9a}
.sb-item{display:flex;align-items:center;gap:7px;padding:.38rem .65rem;margin:1px .4rem;border-radius:6px;cursor:pointer;font-size:12px;color:#6b6b6b;transition:all .15s;border:none;background:transparent;width:calc(100% - .8rem);text-align:left}
.sb-item:hover{background:#F4F4F3;color:#1a1a1a}
.sb-item.active{background:#F0EFFD;color:#7F77DD;font-weight:500}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-bottom{padding:.65rem .75rem;border-top:1px solid #EBEBEA;font-size:10px;color:#9a9a9a;flex-shrink:0}
/* TOPBAR */
.page-title{font-size:14px;font-weight:600;color:#1a1a1a}
.view-toggle{display:flex;background:#F4F4F3;border-radius:7px;padding:2px;gap:1px}
.view-btn{padding:4px 10px;font-size:11px;background:transparent;border:none;cursor:pointer;color:#6b6b6b;border-radius:5px;transition:all .15s;font-weight:500}
.view-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn-new{display:flex;align-items:center;gap:4px;padding:6px 12px;font-size:12px;border:none;border-radius:7px;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500}
.btn-new:hover{opacity:.85}
/* CARDS GENERALES */
.section-card{background:#fff;border:1px solid #EBEBEA;border-radius:11px;margin-bottom:1rem;overflow:hidden}
.section-header{display:flex;align-items:center;gap:9px;padding:.8rem 1.1rem;cursor:pointer;background:#FAFAF9;border-bottom:1px solid #EBEBEA}
.section-header:hover{background:#F4F4F3}
/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.dash-card{background:#fff;border:1px solid #EBEBEA;border-radius:11px;padding:.85rem 1rem}
.dash-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:.4rem}
.dash-val{font-size:24px;font-weight:700;line-height:1}
.dash-label{font-size:11px;color:#9a9a9a;margin-top:2px}
.pipeline-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.pipe-card{background:#fff;border:1px solid #EBEBEA;border-radius:11px;padding:.85rem 1rem}
.pipe-name{font-size:12px;font-weight:600;margin-bottom:.4rem;display:flex;align-items:center;gap:6px}
.pipe-val{font-size:18px;font-weight:700;color:#1a1a1a}
.pipe-label{font-size:10px;color:#9a9a9a}
.pipe-bar{height:4px;background:#F4F4F3;border-radius:2px;margin-top:.5rem;overflow:hidden}
.pipe-fill{height:100%;border-radius:2px}
.alert-row{display:flex;gap:7px;margin-bottom:1rem;flex-wrap:wrap}
.alert-pill{padding:.35rem .8rem;border-radius:8px;font-size:11px;font-weight:500}
.ap-warn{background:#FEF3C7;color:#D97706}
.ap-danger{background:#FEE2E2;color:#DC2626}
.ap-info{background:#EEF2FF;color:#6366F1}
.ap-orange{background:#FFF7ED;color:#EA580C}
.verticals-dash{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.vdash{background:#fff;border:1px solid #EBEBEA;border-radius:11px;padding:.85rem 1rem;cursor:pointer}
.vdash:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.vdash-header{display:flex;align-items:center;gap:7px;margin-bottom:.6rem}
.vdash-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.vdash-name{font-size:12px;font-weight:600;flex:1}
.vdash-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.cap-bar-wrap{margin-bottom:.5rem}
.cap-bar-label{display:flex;justify-content:space-between;font-size:10px;color:#9a9a9a;margin-bottom:3px}
.cap-bar{height:5px;background:#F4F4F3;border-radius:3px;overflow:hidden}
.cap-fill{height:100%;border-radius:3px;transition:width .5s}
.vdash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.vstat{text-align:center}
.vstat-val{font-size:14px;font-weight:700}
.vstat-label{font-size:9px;color:#9a9a9a;text-transform:uppercase;letter-spacing:.03em}
.risk-section{background:#fff;border:1px solid #EBEBEA;border-radius:11px;padding:.85rem 1rem;margin-bottom:1rem}
.risk-title{font-size:11px;font-weight:700;margin-bottom:.65rem;text-transform:uppercase;letter-spacing:.04em}
.risk-row{display:flex;align-items:center;gap:10px;padding:.5rem .65rem;border:1px solid #FEE2E2;border-radius:8px;margin-bottom:.4rem;background:#FFFAF9;cursor:pointer}
.risk-row:hover{background:#FEF2F2}
/* BADGE */
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-client{background:#ECFDF5;color:#059669}
.badge-product{background:#F4F4F3;color:#6b6b6b}
.badge-core{background:#EEF2FF;color:#6366F1;border:1px solid #C7D2FE}
.badge-pipeline{background:#FEF3C7;color:#D97706}
.badge-demo{background:#FFF7ED;color:#EA580C}
.badge-risk{background:#FEE2E2;color:#DC2626}
.badge-won{background:#D1FAE5;color:#059669}
.badge-lost{background:#F4F4F3;color:#9a9a9a}
.chevron{font-size:13px;color:#9a9a9a;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
/* OPPORTUNITY CARDS */
.opp-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.opp-card{background:#fff;border:1px solid #EBEBEA;border-radius:11px;padding:1rem;cursor:pointer;transition:all .15s}
.opp-card:hover{border-color:#D0D0CE;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.opp-card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:.5rem}
.opp-card-name{font-size:13px;font-weight:600;flex:1}
.opp-products{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.5rem}
.opp-product-tag{font-size:10px;padding:2px 7px;border-radius:6px;background:#F0EFFD;color:#7F77DD;font-weight:500}
.opp-meta{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.opp-meta-item{font-size:10px;color:#9a9a9a}
.opp-meta-val{font-size:11px;font-weight:600;color:#1a1a1a}
.opp-footer{display:flex;align-items:center;gap:6px;margin-top:.6rem;padding-top:.6rem;border-top:1px solid #EBEBEA}
.prob-bar{flex:1;height:4px;background:#F4F4F3;border-radius:2px;overflow:hidden}
.prob-fill{height:100%;border-radius:2px;transition:width .5s}
/* CLIENT CARDS */
.client-list{display:flex;flex-direction:column;gap:.65rem}
.client-row{background:#fff;border:1px solid #EBEBEA;border-radius:11px;overflow:hidden}
.client-row-header{display:flex;align-items:center;gap:10px;padding:.75rem 1.1rem;cursor:pointer;background:#FAFAF9;border-bottom:1px solid #EBEBEA}
.client-row-header:hover{background:#F4F4F3}
.client-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.client-info{flex:1}
.client-company{font-size:13px;font-weight:600}
.client-contact{font-size:10px;color:#9a9a9a;margin-top:1px}
.client-body{padding:.75rem 1.1rem}
.client-products{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.6rem}
/* KANBAN */
.platform-section{margin-bottom:1rem;background:#fff;border:1px solid #EBEBEA;border-radius:11px;overflow:hidden}
.platform-header{display:flex;align-items:center;gap:9px;padding:.75rem 1.1rem;cursor:pointer;border-bottom:1px solid #EBEBEA;background:#FAFAF9}
.platform-header:hover{background:#F4F4F3}
.platform-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.platform-info{flex:1}
.platform-name{font-size:13px;font-weight:600}
.platform-sub{font-size:10px;color:#9a9a9a;margin-top:1px}
.module-section{border-bottom:1px solid #EBEBEA}
.module-section:last-child{border-bottom:none}
.module-header{display:flex;align-items:center;gap:7px;padding:.45rem 1.1rem .45rem 1.5rem;background:#FAFAF9;border-bottom:1px solid #EBEBEA}
.module-name{font-size:10px;font-weight:700;color:#6b6b6b;flex:1;text-transform:uppercase;letter-spacing:.06em}
.module-count{font-size:10px;color:#9a9a9a}
.kanban{display:grid;grid-template-columns:repeat(4,minmax(0,1fr))}
.kcol{border-right:1px solid #EBEBEA;min-height:70px}
.kcol:last-child{border-right:none}
.kcol-header{padding:.4rem .8rem;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9a9a9a;border-bottom:1px solid #EBEBEA;display:flex;justify-content:space-between;align-items:center}
.kcol-header.s-backlog{border-top:2px solid #D1D5DB}
.kcol-header.s-inprogress{border-top:2px solid #F59E0B}
.kcol-header.s-review{border-top:2px solid #6366F1}
.kcol-header.s-done{border-top:2px solid #10B981}
.kcol-count{background:#F4F4F3;color:#6b6b6b;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:600}
.kcol-body{padding:.45rem;display:flex;flex-direction:column;gap:.3rem;min-height:70px;transition:background .15s}
.kcol-body.drag-over{background:#F0EFFD;border-radius:6px}
/* STORY CARD */
.card{background:#fff;border:1.5px solid #EBEBEA;border-radius:8px;padding:.5rem .6rem;cursor:grab;transition:all .15s;user-select:none}
.card:hover{border-color:#D0D0CE;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.card.dragging{opacity:.4;transform:rotate(1.5deg);cursor:grabbing}
.card.has-risk{border-left:3px solid #DC2626}
.card-row1{display:flex;align-items:flex-start;gap:5px;margin-bottom:.2rem}
.card-title{font-size:11px;font-weight:600;flex:1;line-height:1.4}
.prio-badge{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;flex-shrink:0}
.prio-badge.high{background:#FEE2E2;color:#DC2626}
.prio-badge.mid{background:#FEF3C7;color:#D97706}
.prio-badge.low{background:#D1FAE5;color:#059669}
.card-story{font-size:10px;color:#6b6b6b;font-style:italic;line-height:1.4;margin-bottom:.2rem;border-left:2px solid #EBEBEA;padding-left:5px}
.card-story.empty{color:#C9C9C7;font-style:normal;border-left-color:#F4F4F3}
.card-dates{display:flex;gap:4px;margin-bottom:.2rem;flex-wrap:wrap}
.date-tag{font-size:9px;padding:1px 6px;border-radius:5px;font-weight:500}
.date-obj{background:#F0FDF4;color:#059669;border:1px solid #BBF7D0}
.date-est{background:#EEF2FF;color:#6366F1;border:1px solid #C7D2FE}
.date-overdue{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA}
.date-week{background:#FEF3C7;color:#D97706;border:1px solid #FDE68A}
.card-footer{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-top:.15rem}
.card-tag{font-size:9px;padding:1px 5px;border:1px solid #EBEBEA;border-radius:5px;color:#6b6b6b;background:#FAFAF9;font-weight:500}
.card-owner{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:600}
.card-owner.mariano{background:#EEF2FF;color:#6366F1}
.card-owner.mauricio{background:#F0EFFD;color:#7F77DD}
.card-owner.ambos{background:#F0FDF4;color:#059669}
.card-risk-badge{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:700;background:#FEE2E2;color:#DC2626}
.card-next{font-size:9px;color:#6366F1;background:#EEF2FF;padding:1px 5px;border-radius:5px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.add-btn{display:flex;align-items:center;gap:3px;padding:.3rem .4rem;font-size:10px;color:#9a9a9a;border:1.5px dashed #EBEBEA;border-radius:6px;background:transparent;cursor:pointer;width:100%;transition:all .15s}
.add-btn:hover{color:#6b6b6b;border-color:#D0D0CE;background:#FAFAF9}
.empty-msg{font-size:10px;color:#C9C9C7;text-align:center;padding:1rem .5rem}
/* PRODUCT VIEW */
.product-group{margin-bottom:1.5rem}
.product-group-label{font-size:10px;font-weight:700;color:#9a9a9a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem;display:flex;align-items:center;gap:8px}
.product-card{background:#fff;border:1px solid #EBEBEA;border-radius:11px;overflow:hidden;margin-bottom:.75rem}
.product-card-header{display:flex;align-items:center;gap:9px;padding:.7rem 1.1rem;background:#FAFAF9;border-bottom:1px solid #EBEBEA;cursor:pointer}
.product-card-header:hover{background:#F4F4F3}
.product-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.product-name{font-size:13px;font-weight:600;flex:1}
.product-platforms{display:flex;gap:4px}
.platform-tag{font-size:10px;padding:2px 7px;border-radius:6px;color:#fff;font-weight:500}
/* FILTER */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-label{font-size:10px;color:#9a9a9a;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-right:2px}
.chip{padding:4px 11px;font-size:11px;border:1.5px solid #EBEBEA;border-radius:20px;background:#fff;color:#6b6b6b;cursor:pointer;transition:all .15s;font-weight:500}
.chip.active{border-color:#7F77DD;color:#7F77DD;background:#F0EFFD}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border:1px solid #EBEBEA;border-radius:14px;padding:1.5rem;width:min(600px,94vw);max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:15px;font-weight:700}
.modal-close{width:26px;height:26px;border-radius:6px;border:1px solid #EBEBEA;background:transparent;cursor:pointer;color:#6b6b6b;font-size:13px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.form-full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:.3rem}
.field label{font-size:10px;color:#6b6b6b;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{font-size:12px;border:1.5px solid #EBEBEA;border-radius:7px;padding:.45rem .6rem;background:#fff;color:#1a1a1a;width:100%;outline:none;transition:border-color .15s;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#7F77DD}
.field textarea{resize:vertical;min-height:60px}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;padding:.5rem;border:1.5px solid #EBEBEA;border-radius:7px;background:#FAFAF9}
.check-row{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;padding:2px 0;font-weight:500}
.check-row input{width:13px;height:13px;cursor:pointer;accent-color:#7F77DD}
.core-notice{display:none;font-size:11px;color:#6366F1;background:#EEF2FF;padding:.4rem .65rem;border-radius:6px}
.surfaces-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;padding:.5rem;border:1.5px solid #EBEBEA;border-radius:7px;background:#FAFAF9}
.risk-toggle-row{display:flex;align-items:center;gap:10px;padding:.5rem .65rem;border:1.5px solid #EBEBEA;border-radius:7px;background:#FAFAF9}
.risk-toggle-label{font-size:12px;font-weight:500;flex:1}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#D1D5DB;border-radius:20px;cursor:pointer;transition:background .2s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle input:checked+.toggle-slider{background:#DC2626}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}
.ai-box{background:linear-gradient(135deg,#F0EFFD,#EEF2FF);border:1.5px solid #C7D2FE;border-radius:10px;padding:.85rem;margin-bottom:.75rem}
.ai-box-title{font-size:11px;font-weight:700;color:#6366F1;margin-bottom:.5rem}
.ai-input-row{display:flex;gap:6px}
.ai-input{flex:1;font-size:12px;border:1.5px solid #C7D2FE;border-radius:7px;padding:.4rem .6rem;background:#fff;color:#1a1a1a;outline:none;font-family:inherit}
.ai-input:focus{border-color:#7F77DD}
.ai-btn{padding:.4rem .85rem;font-size:12px;border:none;border-radius:7px;background:#7F77DD;color:#fff;cursor:pointer;font-weight:600;white-space:nowrap}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #EBEBEA}
.btn-del{font-size:11px;color:#DC2626;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600}
.modal-actions{display:flex;gap:7px}
.btn-sec{padding:.4rem .9rem;font-size:12px;border:1.5px solid #EBEBEA;border-radius:7px;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500}
.btn-pri{padding:.4rem .9rem;font-size:12px;border-radius:7px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-weight:600}
.btn-pri:disabled{opacity:.5}
.tab-row{display:flex;gap:2px;background:#F4F4F3;border-radius:8px;padding:2px;margin-bottom:1rem}
.tab-btn{flex:1;padding:5px;font-size:11px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:#6b6b6b;font-weight:500;transition:all .15s}
.tab-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:.5rem 1.1rem;border-radius:7px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap}
.toast.show{opacity:1}
.section-hidden{display:none}
.loading{text-align:center;padding:2.5rem;color:#9a9a9a;font-size:12px}
.divider-label{font-size:10px;font-weight:700;color:#9a9a9a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-mark">ks</div>
    <span class="sb-text">kett<span>simple</span></span>
  </div>
  <div style="padding:.4rem 0;flex:1">
    <div class="sb-section">Sistema</div>
    <button class="sb-item active" id="sb-dashboard" onclick="setView('dashboard',this)">⬡ Dashboard</button>
    <button class="sb-item" id="sb-opportunities" onclick="setView('opportunities',this)">◈ Oportunidades</button>
    <button class="sb-item" id="sb-clients" onclick="setView('clients',this)">◎ Clientes</button>
    <div class="sb-section" style="margin-top:.3rem">Backlog</div>
    <button class="sb-item" id="sb-product" onclick="setView('product',this)">☰ Por producto</button>
    <button class="sb-item" id="sb-platform" onclick="setView('platform',this)">▦ Por plataforma</button>

/* ── DASHBOARD ── */
function renderDash(){
  const riskCards=stories.filter(c=>c.risk&&c.status!=='done');
  const overdue=stories.filter(c=>isOverdue(c.dateObj)&&c.status!=='done');
  const thisWeek=stories.filter(c=>isThisWeek(c.dateObj)&&c.status!=='done');
  const activeOpps=opps.filter(o=>o.status!=='ganada'&&o.status!=='perdida');
  const pipeUsd=activeOpps.reduce((a,o)=>a+(parseFloat(o.valueUsd)||0)*(o.probability||0)/100,0);
  const pipeArs=activeOpps.reduce((a,o)=>a+(parseFloat(o.valueArs)||0)*(o.probability||0)/100,0);

  const alerts=[];
  Object.entries(PLATFORMS).forEach(([pid,p])=>{
    const n=stories.filter(c=>c.platform===pid&&c.status==='inprogress').length;
    if(n>CAP)alerts.push({t:'danger',msg:`${p.label}: ${n} en curso (límite ${CAP})`});
    const hp=stories.filter(c=>c.platform===pid&&c.status==='backlog'&&c.prio==='high').length;
    if(hp>0)alerts.push({t:'warn',msg:`${p.label}: ${hp} alta prioridad sin iniciar`});
  });
  if(overdue.length)alerts.push({t:'danger',msg:`${overdue.length} historia${overdue.length>1?'s':''} vencida${overdue.length>1?'s':''}`});
  if(thisWeek.length)alerts.push({t:'warn',msg:`${thisWeek.length} con fecha esta semana`});

  const vdash=Object.entries(PLATFORMS).map(([pid,p])=>{
    const pc=stories.filter(c=>c.platform===pid);
    const n=pc.filter(c=>c.status==='inprogress').length,dn=pc.filter(c=>c.status==='done').length,bl=pc.filter(c=>c.status==='backlog').length;
    const pct=Math.min((n/CAP)*100,100);
    const cc=n===0?'#D1D5DB':n<CAP?'#10B981':n===CAP?'#F59E0B':'#EF4444';
    const bt=n===0?'Libre':n<CAP?'Normal':n===CAP?'Al límite':'Sobrecarga';
    const bb=n===0?'#F4F4F3':n<CAP?'#D1FAE5':n===CAP?'#FEF3C7':'#FEE2E2';
    const bc=n===0?'#6b6b6b':n<CAP?'#059669':n===CAP?'#D97706':'#DC2626';
    const pr=pc.filter(c=>c.risk&&c.status!=='done').length;
    return `<div class="vdash" onclick="jumpTo('${pid}',document.querySelector('.sb-item'))">
      <div class="vdash-header"><span class="vdash-dot" style="background:${p.color}"></span><span class="vdash-name">${p.label}</span><span class="vdash-badge" style="background:${bb};color:${bc}">${bt}</span>${pr?`<span class="vdash-badge" style="background:#FEE2E2;color:#DC2626">⚠${pr}</span>`:''}</div>
      <div class="cap-bar-wrap"><div class="cap-bar-label"><span>En curso</span><span>${n}/${CAP}</span></div><div class="cap-bar"><div class="cap-fill" style="width:${pct}%;background:${cc}"></div></div></div>

    <div class="card-footer">${c.risk?'<span class="card-risk-badge">⚠</span>':''}${otag}${opptag}${c.next?`<span class="card-next">→${c.next}</span>`:''}</div>

/* ── DRAG & DROP ── */
let dragId=null,dragOldSt=null;
function setupDrag(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('dragstart',e=>{const s=stories.find(x=>x.id===card.dataset.id);dragId=card.dataset.id;dragOldSt=s?.status;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
  });
  document.querySelectorAll('.kcol-body').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',async e=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(!dragId)return;
      const ns=col.dataset.status,s=stories.find(c=>c.id===dragId);
      if(!s||s.status===ns){dragId=null;return;}
      const os=dragOldSt;s.status=ns;
      const{error}=await db.from('stories').update({status:ns}).eq('id',dragId);
      if(error){s.status=os;toast('Error');dragId=null;return;}
      toast(`→ ${SL[ns]}`);sendMail(s,os,ns);
      dragId=null;dragOldSt=null;renderMain();
    });
  });
}

function toggleSec(id,chevId){
  const el=document.getElementById(id);if(!el)return;
  const h=el.classList.toggle('section-hidden');
  if(chevId){const ch=document.getElementById(chevId);if(ch)ch.textContent=h?'▸':'▾';}
}

  document.getElementById('f-status').value=status;
  document.getElementById('f-prio').value='mid';
  document.getElementById('f-owner').value='mauricio';
  document.getElementById('f-risk').checked=false;
  document.getElementById('risk-ctx-wrap').style.display='none';
  document.getElementById('core-notice').style.display='none';
  document.getElementById('story-del-btn').style.display='none';
  document.querySelectorAll('#surfaces-check input').forEach(cb=>cb.checked=false);
  populateClientsCheck([]);populateOppSelect();
  if(platform){onPlatformChange();const sel=document.getElementById('f-module');for(const o of sel.options)if(o.value===module){o.selected=true;break;}onModuleChange();}
  document.getElementById('story-modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}

function openEditStory(sid){
  const s=stories.find(x=>x.id===sid);if(!s)return;
  editStoryId=sid;
  document.getElementById('story-modal-title').textContent='Editar historia';
  document.getElementById('f-title').value=s.title||'';
  document.getElementById('f-story').value=s.story||'';
  document.getElementById('f-platform').value=s.platform||'';
  document.getElementById('f-status').value=s.status||'backlog';
  document.getElementById('f-prio').value=s.prio||'mid';
  document.getElementById('f-owner').value=s.owner||'mauricio';
  document.getElementById('f-next').value=s.next||'';
  document.getElementById('f-date-obj').value=s.dateObj||'';
  document.getElementById('f-date-est').value=s.dateEst||'';
  document.getElementById('f-risk').checked=!!s.risk;
  document.getElementById('f-risk-ctx').value=s.riskCtx||'';
  document.getElementById('risk-ctx-wrap').style.display=s.risk?'flex':'none';
  document.getElementById('ai-prompt').value='';
  document.getElementById('story-del-btn').style.display='flex';
  onPlatformChange();
  const sel=document.getElementById('f-module');for(const o of sel.options)if(o.value===s.module){o.selected=true;break;}
  onModuleChange();
  populateClientsCheck(s.clients||[]);
  populateOppSelect(s.oppId||'');
  document.querySelectorAll('#surfaces-check input').forEach(cb=>cb.checked=(s.surfaces||[]).includes(cb.value));
  document.getElementById('story-modal').classList.add('open');
}

function closeStoryModal(){document.getElementById('story-modal').classList.remove('open');editStoryId=null;}

async function generateStory(){
  const prompt=document.getElementById('ai-prompt').value.trim();if(!prompt){toast('Escribí el requerimiento');return;}
  const p=document.getElementById('f-platform').value,m=document.getElementById('f-module').value;
  const btn=document.getElementById('ai-btn');btn.textContent='Generando...';btn.disabled=true;
  try{
    const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,platform:p,module:m})});
    const parsed=JSON.parse(await r.text());
    if(parsed.title)document.getElementById('f-title').value=parsed.title;
    if(parsed.story)document.getElementById('f-story').value=parsed.story;
    if(parsed.next)document.getElementById('f-next').value=parsed.next;
    toast('Historia generada ✓');
  }catch(e){toast('Error al generar');}
  btn.textContent='Generar';btn.disabled=false;
}

async function saveStory(){
  const title=document.getElementById('f-title').value.trim();if(!title){toast('Falta el título');return;}
  const platform=document.getElementById('f-platform').value;if(!platform){toast('Falta la plataforma');return;}
  const s={id:editStoryId||'s'+Date.now(),title,story:document.getElementById('f-story').value.trim(),platform,module:document.getElementById('f-module').value,status:document.getElementById('f-status').value,prio:document.getElementById('f-prio').value,owner:document.getElementById('f-owner').value,next:document.getElementById('f-next').value.trim(),clients:[...document.querySelectorAll('#clients-check input:checked')].map(x=>x.value),surfaces:[...document.querySelectorAll('#surfaces-check input:checked')].map(x=>x.value),dateObj:document.getElementById('f-date-obj').value||null,dateEst:document.getElementById('f-date-est').value||null,risk:document.getElementById('f-risk').checked,riskCtx:document.getElementById('f-risk-ctx').value.trim(),oppId:document.getElementById('f-opportunity').value||null};
  const btn=document.getElementById('story-save-btn');btn.textContent='Guardando...';btn.disabled=true;
  const row={id:s.id,title:s.title,story:s.story||null,platform:s.platform,module:s.module,status:s.status,prio:s.prio,owner:s.owner,next_step:s.next||null,clients:s.clients,surfaces:s.surfaces,date_obj:s.dateObj,date_est:s.dateEst,risk:s.risk,risk_ctx:s.riskCtx||null,opportunity_id:s.oppId||null};
  const{error}=editStoryId?await db.from('stories').update(row).eq('id',s.id):await db.from('stories').insert(row);
  btn.textContent='Guardar historia';btn.disabled=false;
  if(error){toast('Error al guardar');return;}
  if(editStoryId){const idx=stories.findIndex(x=>x.id===editStoryId);if(idx>=0)stories[idx]=s;}else stories.push(s);
  toast('Guardada ✓');closeStoryModal();renderMain();
}

async function deleteStory(){
  if(!editStoryId||!confirm('¿Eliminar?'))return;
  await db.from('stories').delete().eq('id',editStoryId);
  stories=stories.filter(x=>x.id!==editStoryId);
  toast('Eliminada');closeStoryModal();renderMain();
}

}
